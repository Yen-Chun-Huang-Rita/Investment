<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭投資追蹤系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f6f6f4;--bg3:#efefec;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --pos:#1D9E75;--neg:#D85A30;
  --rad:8px;--radl:12px;
  --shadow:0 1px 4px rgba(0,0,0,0.07);
  --c1:#185FA5;--c1l:#E6F1FB;
  --c2:#3B6D11;--c2l:#EAF3DE;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:19px;}
.shell{max-width:1100px;margin:0 auto;padding:1.5rem 1rem;}

/* ── THEME BACKGROUNDS ── */
body.theme-sage   {--bg3:#e8ede8;--bg2:#dde5dd;--bg:#f4f7f4;}
body.theme-slate  {--bg3:#e4e8ed;--bg2:#d8dde5;--bg:#f3f5f8;}
body.theme-sand   {--bg3:#ede8e0;--bg2:#e3ddd4;--bg:#f7f4ef;}
body.theme-rose   {--bg3:#ede4e4;--bg2:#e3d8d8;--bg:#f7f2f2;}
body.theme-night  {--bg3:#1a1a2e;--bg2:#16213e;--bg:#0f3460;--text:#e0e0e0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);}
body.theme-charcoal{--bg3:#2b2b2b;--bg2:#333;--bg:#3d3d3d;--text:#f0f0f0;--text2:#bbb;--text3:#777;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);}

/* ── THEME PICKER ── */
.theme-picker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.theme-picker label{font-size:13px;color:var(--text2);}
.theme-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .12s;flex-shrink:0;}
.theme-swatch:hover,.theme-swatch.active{border-color:var(--text);transform:scale(1.15);}

/* ── IMPORT/EXPORT ── */
.io-btn{font-size:13px;padding:5px 12px;border-radius:var(--rad);cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);}
.io-btn:hover{background:var(--bg2);color:var(--text);}
#fileInput{display:none;}

/* ── MODAL OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--bg);border-radius:var(--radl);padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
.modal-title{font-size:20px;font-weight:600;margin-bottom:1.25rem;color:var(--text);}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end;}
.hidden{display:none!important;}

/* ── BUTTONS ── */
.btn{font-size:15px;padding:9px 20px;border-radius:var(--rad);cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);transition:background .12s;}
.btn:hover{background:var(--bg2);}
.btn-primary{color:#fff;border:none;}
.btn-u1{background:var(--c1);}  .btn-u1:hover{background:#0C447C;}
.btn-u2{background:var(--c2);}  .btn-u2:hover{background:#27500A;}
.btn-danger{background:#D85A30;color:#fff;border:none;}
.btn-danger:hover{background:#993C1D;}
.btn-sm{padding:6px 14px;font-size:14px;}
.btn-icon{padding:5px 12px;font-size:14px;background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text2);}
.btn-icon:hover{background:var(--bg2);}
.btn-icon.danger:hover{border-color:var(--neg);color:var(--neg);}

/* ── FORM ELEMENTS ── */
select,input,textarea{font-size:15px;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:var(--rad);padding:9px 12px;outline:none;width:100%;}
select:focus,input:focus{border-color:var(--c1);}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg label,.form-label{font-size:13px;color:var(--text2);display:block;margin-bottom:3px;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.seg{display:flex;border:1px solid var(--border2);border-radius:var(--rad);overflow:hidden;}
.seg button{flex:1;padding:9px;border:none;background:var(--bg2);color:var(--text2);cursor:pointer;font-size:15px;}
.seg button.active{background:var(--c1);color:#fff;}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;padding:3rem 1rem 2rem;}
.welcome-logo{font-size:32px;font-weight:700;margin-bottom:.4rem;}
.welcome-sub{font-size:16px;color:var(--text2);margin-bottom:2.5rem;}
.user-cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;}
.user-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radl);padding:1.75rem 2rem;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:border-color .15s,transform .12s,box-shadow .12s;min-width:185px;position:relative;}
.user-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,0.12);}
.user-card.u1:hover{border-color:var(--c1);}
.user-card.u2:hover{border-color:var(--c2);}
.avatar{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;margin:0 auto 1rem;}
.av1{background:var(--c1l);color:var(--c1);}
.av2{background:var(--c2l);color:var(--c2);}
.user-card h3{font-size:21px;font-weight:600;margin-bottom:6px;}
.user-card .stat{font-size:15px;color:var(--text2);}
.user-card .stat.pos{color:var(--pos);}
.user-card .stat.neg{color:var(--neg);}
.edit-name-btn{position:absolute;top:8px;right:8px;font-size:13px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);}
.edit-name-btn:hover{color:var(--text2);}

/* ── APP ── */
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.user-pill{display:flex;align-items:center;gap:10px;}
.pill-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;}
.app-title{font-size:21px;font-weight:600;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;}
.tab{padding:11px 22px;font-size:15px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;}
.tab.active{font-weight:600;border-bottom-width:2px;}
.tab.active.u1{color:var(--c1);border-bottom-color:var(--c1);}
.tab.active.u2{color:var(--c2);border-bottom-color:var(--c2);}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radl);border:1px solid var(--border);background:var(--bg);margin-bottom:1rem;}
table{width:100%;border-collapse:collapse;min-width:760px;}
th{padding:11px 13px;text-align:left;font-size:13px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;}
td{padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;font-size:15px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.right{text-align:right;}
.pos{color:var(--pos);}
.neg{color:var(--neg);}
.ticker-name{font-weight:600;font-size:15px;}
.ticker-sub{font-size:13px;color:var(--text2);}
.mkt-badge{font-size:12px;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--text2);margin-left:4px;}
.curr-badge{font-size:12px;padding:2px 7px;border-radius:3px;margin-left:3px;}
.curr-TWD{background:#E6F1FB;color:#185FA5;}
.curr-USD{background:#EAF3DE;color:#3B6D11;}
.curr-JPY{background:#FAEEDA;color:#854F0B;}
.curr-HKD{background:#FBEAF0;color:#993556;}

/* ── METRIC CARDS ── */
.mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:1rem;}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rad);padding:17px 20px;box-shadow:var(--shadow);min-width:0;}
.mc-label{font-size:13px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.mc-val{font-size:clamp(17px,2.3vw,23px);font-weight:700;word-break:break-all;line-height:1.2;}
.mc-sub{font-size:14px;color:var(--text2);margin-top:4px;}

/* ── CASH SECTION ── */
.cash-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--radl);padding:1rem 1.25rem;margin-bottom:1.5rem;box-shadow:var(--shadow);}
.cash-section h4{font-size:16px;font-weight:600;margin-bottom:10px;color:var(--text);}
.cash-rows{display:flex;flex-direction:column;gap:8px;}
.cash-row-item{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cash-row-item label{font-size:15px;color:var(--text2);width:65px;flex-shrink:0;}
.cash-row-item input{max-width:160px;}
.cash-row-item .cash-val{font-size:15px;font-weight:500;min-width:140px;}
.cash-total-row{border-top:1px solid var(--border);padding-top:10px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
.cash-total-row .label{font-size:14px;color:var(--text2);}
.cash-total-row .val{font-size:20px;font-weight:700;}

/* ── PRICE TABLE ── */
.price-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--radl);padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);}
.price-section h4{font-size:16px;font-weight:600;margin-bottom:10px;}
.price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.price-item{display:flex;align-items:center;gap:8px;}
.price-item .ticker-label{font-size:15px;font-weight:500;min-width:85px;}
.price-item input{max-width:130px;}
.fx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:1rem;}
.fx-item{display:flex;align-items:center;gap:8px;font-size:15px;}
.fx-item label{color:var(--text2);min-width:115px;}
.fx-item input{max-width:115px;}

/* ── COLLAPSIBLE STOCK ROWS ── */
.stock-header-row{cursor:pointer;user-select:none;}
.stock-header-row:hover td{background:var(--bg2);}
.stock-toggle{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);font-size:15px;font-weight:700;color:var(--text2);flex-shrink:0;transition:transform .2s,background .15s;margin-right:6px;}
.stock-toggle.open{transform:rotate(45deg);background:var(--bg3);}
.stock-detail-row td{padding-top:0;padding-bottom:10px;background:var(--bg2) !important;}
.stock-detail-row.collapsed{display:none;}

/* ── COLLAPSIBLE DISPOSAL GROUPS ── */
.dgh-toggle{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);font-size:16px;font-weight:700;color:var(--text2);cursor:pointer;flex-shrink:0;transition:transform .2s,background .15s;background:var(--bg);margin-right:4px;}
.dgh-toggle.open{transform:rotate(45deg);}
.disposal-body-wrap.collapsed{display:none;}

/* ── EXPAND/COLLAPSE ALL ── */
.collapse-all-btn{font-size:14px;padding:6px 14px;border-radius:var(--rad);border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;}
.collapse-all-btn:hover{background:var(--bg2);}

/* ── DISPOSAL ── */
.disposal-badge{font-size:12px;padding:2px 8px;border-radius:10px;background:#FAECE7;color:#D85A30;margin-left:4px;}
@media(prefers-color-scheme:dark){.disposal-badge{background:#4A1B0C;color:#F0997B;}}

/* ── DISPOSAL GROUPED ── */
.disposal-group{margin-bottom:1.5rem;}
.disposal-group-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-radius:var(--rad) var(--rad) 0 0;border:1px solid var(--border);border-bottom:none;}
.dgh-left{display:flex;align-items:center;gap:10px;}
.dgh-title{font-size:16px;font-weight:600;}
.dgh-sub{font-size:13px;color:var(--text2);}
.dgh-pnl{font-size:16px;font-weight:700;}
.disposal-group .tbl-wrap{border-radius:0 0 var(--rad) var(--rad);margin-bottom:0;}
.subtotal-row td{background:var(--bg2)!important;font-weight:600;font-size:14px;border-top:1px solid var(--border2);}

/* ── DASHBOARD ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
@media(max-width:600px){.chart-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radl);padding:1rem 1.25rem;box-shadow:var(--shadow);}
.chart-card h3{font-size:16px;font-weight:600;margin-bottom:10px;}
.cw{position:relative;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
.lg-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);}
.lg-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0;}

.page{display:none;}
.page.active{display:block;}
#mainApp{display:none;}

.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.empty-state{text-align:center;padding:2.5rem;color:var(--text2);font-size:16px;}

.divider{height:1px;background:var(--border);margin:1rem 0;}
.section-label{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
</style>
</head>
<body>
<div class="shell">

<!-- ══ WELCOME ══ -->
<div id="welcomeScreen" class="welcome">
  <div class="welcome-logo">📈 家庭投資追蹤</div>
  <div class="welcome-sub">選擇帳戶進入，資料儲存於本機</div>
  <div class="user-cards">
    <div class="user-card u1" onclick="enterUser(0)">
      <button class="edit-name-btn" onclick="event.stopPropagation();editName(0)">✏️ 改名</button>
      <div class="avatar av1" id="av0">鈞</div>
      <h3 id="uname0">鈞逸</h3>
      <div class="stat" id="stat0">尚無持股</div>
    </div>
    <div class="user-card u2" onclick="enterUser(1)">
      <button class="edit-name-btn" onclick="event.stopPropagation();editName(1)">✏️ 改名</button>
      <div class="avatar av2" id="av1">雁</div>
      <h3 id="uname1">雁君</h3>
      <div class="stat" id="stat1">尚無持股</div>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="mainApp">
  <div class="app-header">
    <div class="user-pill">
      <div class="pill-av" id="headerAv"></div>
      <span class="app-title" id="headerTitle"></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="theme-picker" id="themePicker">
        <label>底色</label>
        <span class="theme-swatch" data-theme="" style="background:#efefec;" title="預設"></span>
        <span class="theme-swatch" data-theme="theme-sage" style="background:#e8ede8;" title="鼠尾草綠"></span>
        <span class="theme-swatch" data-theme="theme-slate" style="background:#e4e8ed;" title="石板藍"></span>
        <span class="theme-swatch" data-theme="theme-sand" style="background:#ede8e0;" title="沙色"></span>
        <span class="theme-swatch" data-theme="theme-rose" style="background:#ede4e4;" title="玫瑰"></span>
        <span class="theme-swatch" data-theme="theme-night" style="background:#1a1a2e;" title="深夜藍"></span>
        <span class="theme-swatch" data-theme="theme-charcoal" style="background:#2b2b2b;" title="炭灰"></span>
      </div>
      <button class="io-btn" onclick="exportJSON()">⬇ 匯出</button>
      <button class="io-btn" onclick="document.getElementById('fileInput').click()">⬆ 匯入</button>
      <input type="file" id="fileInput" accept=".json" onchange="importJSON(this)">
      <button class="btn btn-sm" onclick="goBack()">← 返回</button>
    </div>
  </div>

  <div class="tabs" id="tabBar">
    <button class="tab active" id="tab0" onclick="showTab(0,this)">股票組合</button>
    <button class="tab" id="tab1" onclick="showTab(1,this)">處分紀錄</button>
    <button class="tab" id="tab2" onclick="showTab(2,this)">市價 / 匯率</button>
    <button class="tab" id="tab3" onclick="showTab(3,this)">儀表板</button>
  </div>

  <!-- PAGE 0: 股票組合 -->
  <div id="page0" class="page active">
    <div class="mc-grid" id="summaryGrid"></div>
    <div class="controls">
      <button class="btn btn-primary" id="addBtn" onclick="openAddStock()">+ 新增股票</button>
      <button class="collapse-all-btn" onclick="toggleAllStocks()">⊟ 全部收合</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th colspan="11" style="padding:0;border:none;"></th></tr></thead>
        <tbody id="stockBody"></tbody>
      </table>
    </div>
    <div class="cash-section">
      <h4>現金部位</h4>
      <div class="cash-rows" id="cashRows"></div>
      <div class="cash-total-row">
        <span class="label">現金合計（TWD）</span>
        <span class="val" id="cashTotalDisplay">NT$0</span>
      </div>
    </div>
  </div>

  <!-- PAGE 1: 處分紀錄 -->
  <div id="page1" class="page">
    <div class="mc-grid" id="disposalSummary"></div>
    <div class="controls">
      <button class="collapse-all-btn" onclick="toggleAllDisposals()">⊟ 全部收合</button>
    </div>
    <div id="disposalGroupsContainer"></div>
  </div>

  <!-- PAGE 2: 市價 / 匯率 -->
  <div id="page2" class="page">
    <div class="price-section">
      <h4>股票現價維護</h4>
      <div class="section-label" style="margin-bottom:8px;">（依股票組合中的持股自動列出）</div>
      <div class="price-grid" id="priceGrid"></div>
    </div>
    <div class="price-section">
      <h4>匯率維護（對台幣）</h4>
      <div class="fx-grid">
        <div class="fx-item"><label>USD → TWD</label><input type="number" id="fx_USD" step="0.01" placeholder="32.5" oninput="saveFX()"></div>
        <div class="fx-item"><label>JPY → TWD</label><input type="number" id="fx_JPY" step="0.001" placeholder="0.21" oninput="saveFX()"></div>
        <div class="fx-item"><label>HKD → TWD</label><input type="number" id="fx_HKD" step="0.01" placeholder="4.1" oninput="saveFX()"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-u1" onclick="applyPricesAndRender()">✓ 套用至組合</button>
  </div>

  <!-- PAGE 3: 儀表板 -->
  <div id="page3" class="page">
    <div class="chart-grid">
      <div class="chart-card">
        <h3>資產部位分佈（TWD）</h3>
        <div class="legend" id="allocLegend"></div>
        <div class="cw" style="height:210px;"><canvas id="allocChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>個股損益%</h3>
        <div class="cw" id="pnlWrap" style="height:210px;"><canvas id="pnlChart"></canvas></div>
      </div>
    </div>
    <div class="chart-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
        <div>
          <h3 style="margin-bottom:2px;">總資產趨勢</h3>
          <span style="font-size:13px;color:var(--text2);" id="snapshotCount"></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-sm" id="snapshotBtn" onclick="recordSnapshot()">📌 記錄今日資產</button>
          <button class="collapse-all-btn" onclick="toggleSnapshotList()" id="snapshotListToggle" style="display:none;">管理記錄</button>
        </div>
      </div>
      <div class="cw" style="height:220px;"><canvas id="trendChart"></canvas></div>
      <!-- Snapshot list (hidden by default) -->
      <div id="snapshotList" class="hidden" style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;max-height:200px;overflow-y:auto;"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ════════════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════════════
const CURR_LIST = ['TWD','USD','JPY','HKD'];
const CURR_SYM = {TWD:'NT$',USD:'$',JPY:'¥',HKD:'HK$'};
const PALETTE = ['#185FA5','#3B6D11','#BA7517','#993556','#534AB7','#0F6E56','#D85A30','#0F6E56'];
const USERS_CFG = [
  {key:'u0',colorClass:'u1',color:'#185FA5',lightColor:'#E6F1FB'},
  {key:'u1',colorClass:'u2',color:'#3B6D11',lightColor:'#EAF3DE'},
];

let cu = 0; // current user index
let editNameTarget = 0;
let editStockIndex = -1;
let editMode = 'edit';
let charts = {};

// Default state per user
function defaultState(){
  return {
    names: ['鈞逸','雁君'],
    stocks: [[],[]],
    disposals: [[],[]],
    cash: [{TWD:'',USD:'',JPY:'',HKD:''},{TWD:'',USD:'',JPY:'',HKD:''}],
    prices: {},
    fx: {USD:32.5, JPY:0.215, HKD:4.1},
    themes: ['',''],
    snapshots: [[],[]]   // per-user: [{date, total, mv, cash}]
  };
}

function load(){
  try{ return JSON.parse(localStorage.getItem('invTracker') || 'null') || defaultState(); }
  catch(e){ return defaultState(); }
}
function save(){ localStorage.setItem('invTracker', JSON.stringify(st)); }

// Sort stocks and disposals for current user by date ascending
function sortData(){
  st.stocks[cu].sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  st.disposals[cu].sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
}

function manualSave(){
  save();
  const btn = document.getElementById('saveBtn');
  if(!btn) return;
  const orig = btn.textContent;
  btn.textContent = '✓ 已儲存';
  btn.style.background = 'var(--pos)';
  btn.style.color = '#fff';
  btn.style.borderColor = 'var(--pos)';
  btn.disabled = true;
  setTimeout(()=>{
    btn.textContent = orig;
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.disabled = false;
  }, 1500);
}

let st = load();

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function toTWD(amount, curr){
  if(curr==='TWD') return amount;
  return amount * (st.fx[curr] || 1);
}

function fmtCurr(amount, curr, decimals){
  if(decimals === undefined) decimals = (curr==='USD'||curr==='HKD') ? 2 : 0;
  return CURR_SYM[curr] + amount.toLocaleString('zh-TW',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function fmtTWD(amount){ return 'NT$' + Math.round(amount).toLocaleString('zh-TW'); }
function fmtPct(n){ return (n>=0?'+':'')+n.toFixed(1)+'%'; }
function getPrice(ticker){ return st.prices[ticker.toUpperCase()] || 0; }

function calcUserSummary(ui){
  let tCostTWD=0, tMV_TWD=0;
  st.stocks[ui].forEach(s=>{
    const p = getPrice(s.ticker);
    const cost = s.cost * s.qty;
    const mv = p * s.qty;
    tCostTWD += toTWD(cost, s.curr);
    tMV_TWD += toTWD(mv, s.curr);
  });
  let cashTWD=0;
  CURR_LIST.forEach(c=>{ cashTWD += toTWD(parseFloat(st.cash[ui][c])||0, c); });
  const pnl = tMV_TWD - tCostTWD;
  const pct = tCostTWD>0 ? (pnl/tCostTWD)*100 : 0;
  return {tCostTWD, tMV_TWD, cashTWD, pnl, pct, total: tMV_TWD+cashTWD};
}

function getUserName(ui){ return st.names[ui] || (ui===0?'鈞逸':'雁君'); }
function getInitial(ui){ return getUserName(ui).charAt(0); }

// ════════════════════════════════════════
// WELCOME
// ════════════════════════════════════════
function renderWelcome(){
  [0,1].forEach(ui=>{
    const name = getUserName(ui);
    document.getElementById('uname'+ui).textContent = name;
    document.getElementById('av'+ui).textContent = getInitial(ui);
    const d = calcUserSummary(ui);
    const el = document.getElementById('stat'+ui);
    if(d.tMV_TWD > 0){
      el.textContent = (d.pct>=0?'▲':'▼') + Math.abs(d.pct).toFixed(1) + '% 報酬率';
      el.className = 'stat ' + (d.pct>=0?'pos':'neg');
    } else { el.textContent = '尚無持股'; el.className = 'stat'; }
  });
}

function enterUser(ui){
  cu = ui;
  const cfg = USERS_CFG[ui];
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  const ha = document.getElementById('headerAv');
  ha.textContent = getInitial(ui);
  ha.style.background = cfg.lightColor;
  ha.style.color = cfg.color;
  document.getElementById('headerTitle').textContent = getUserName(ui) + ' 的投資組合';

  document.getElementById('addBtn').className = 'btn btn-primary btn-' + cfg.colorClass;
  document.querySelectorAll('.tab.active').forEach(t=>t.classList.add(cfg.colorClass));

  // Apply saved theme
  if(!st.themes) st.themes = ['',''];
  applyTheme(st.themes[cu] || '');

  // Reset collapse states for new user
  stockOpen = {};
  disposalOpen = {};

  showTab(0, document.getElementById('tab0'));
  renderPricePage();
  renderPortfolio();
}

function goBack(){
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('welcomeScreen').style.display = 'flex';
  applyTheme('');
  destroyCharts();
  renderWelcome();
}

// ════════════════════════════════════════
// NAME EDIT
// ════════════════════════════════════════
function editName(ui){
  editNameTarget = ui;
  document.getElementById('inputEditName').value = getUserName(ui);
  openModal('modalEditName');
}
function confirmEditName(){
  const val = document.getElementById('inputEditName').value.trim();
  if(!val) return;
  st.names[editNameTarget] = val;
  save();
  renderWelcome();
  closeModal('modalEditName');
}

// ════════════════════════════════════════
// TABS
// ════════════════════════════════════════
function showTab(idx, el){
  [0,1,2,3].forEach(i=>{
    document.getElementById('page'+i).classList.remove('active');
    document.getElementById('tab'+i).classList.remove('active','u1','u2');
  });
  document.getElementById('page'+idx).classList.add('active');
  const t = el || document.getElementById('tab'+idx);
  t.classList.add('active', USERS_CFG[cu].colorClass);
  if(idx===3) renderDashboard();
  if(idx===2) renderPricePage();
  if(idx===1) renderDisposalTable();
}

// ════════════════════════════════════════
// PORTFOLIO
// ════════════════════════════════════════
function renderPortfolio(){
  renderStockTable();
  renderSummary();
  renderCash();
  renderDisposalTable();
}

// Track open state for stocks and disposals
let stockOpen = {};   // key: "cu-i" -> bool
let disposalOpen = {}; // key: "ticker" -> bool

function toggleStock(key){
  stockOpen[key] = !stockOpen[key];
  const toggle = document.querySelector(`.stock-toggle[data-key="${key}"]`);
  const detail = document.querySelector(`.stock-detail-row[data-key="${key}"]`);
  if(!toggle||!detail) return;
  toggle.classList.toggle('open', stockOpen[key]);
  detail.classList.toggle('collapsed', !stockOpen[key]);
}

function toggleAllStocks(){
  // stockOpen keys are now ticker-based
  const keys = [...new Set(st.stocks[cu].map(s=>s.ticker))];
  const allOpen = keys.length > 0 && keys.every(k => stockOpen[`${cu}-${k}`]);
  keys.forEach(k=>{ stockOpen[`${cu}-${k}`] = !allOpen; });
  renderStockTable();
  const btn = document.querySelector('#page0 .collapse-all-btn');
  if(btn) btn.textContent = allOpen ? '⊞ 展開全部' : '⊟ 全部收合';
}

function renderStockTable(){
  const tbody = document.getElementById('stockBody');
  const stocks = st.stocks[cu];
  if(!stocks.length){ tbody.innerHTML = '<tr><td colspan="3" class="empty-state">尚無持股，點擊「新增股票」開始建立</td></tr>'; return; }

  // Group by ticker (preserve order of first appearance)
  const groupOrder = [];
  const groups = {};
  stocks.forEach((s,i)=>{
    if(!groups[s.ticker]){
      groups[s.ticker] = { ticker:s.ticker, name:s.name, curr:s.curr, rows:[] };
      groupOrder.push(s.ticker);
    }
    groups[s.ticker].rows.push({s, i});
  });

  let html = '';

  groupOrder.forEach(ticker=>{
    const g = groups[ticker];
    const key = `${cu}-${ticker}`;
    if(!(key in stockOpen)) stockOpen[key] = false; // default collapsed
    const isOpen = stockOpen[key];

    const curr = g.curr;
    const dec = (curr==='USD'||curr==='HKD') ? 2 : 0;
    const p = getPrice(ticker);
    const showOrig = curr !== 'TWD' && p > 0;

    // Aggregate totals across all rows of this ticker
    let totalQty = 0, totalCostOrig = 0;
    g.rows.forEach(({s})=>{ totalQty += s.qty; totalCostOrig += s.cost * s.qty; });
    const avgCost = totalQty > 0 ? totalCostOrig / totalQty : 0;
    const totalMVOrig = p > 0 ? p * totalQty : 0;
    const totalCostTWD = toTWD(totalCostOrig, curr);
    const totalMVTWD   = toTWD(totalMVOrig, curr);
    const pnlTWD = totalMVTWD - totalCostTWD;
    const pnlOrig = totalMVOrig - totalCostOrig;
    const pct = totalCostTWD > 0 ? (pnlTWD / totalCostTWD) * 100 : 0;
    const pc = pnlTWD >= 0 ? 'pos' : 'neg';

    // Collapsed summary bar
    const mvSummary   = p > 0 ? `<span style="font-size:14px;color:var(--text2);">市值 ${fmtTWD(totalMVTWD)}${showOrig?` <span style="font-size:12px;">(${fmtCurr(totalMVOrig,curr,dec)})</span>`:''}</span>` : '';
    const pnlSummary  = p > 0
      ? `<span class="${pc}" style="font-size:14px;font-weight:600;">${pnlTWD>=0?'+':'-'}${fmtTWD(Math.abs(pnlTWD))}${showOrig?` <span style="font-size:12px;">(${pnlOrig>=0?'+':''}${fmtCurr(pnlOrig,curr,dec)})</span>`:''} ${fmtPct(pct)}</span>`
      : `<span style="color:var(--text3);font-size:13px;">未設市價</span>`;
    const costSummary = `<span style="font-size:14px;color:var(--text2);">成本 ${fmtCurr(totalCostOrig,curr,dec)}</span>`;
    const qtySummary  = `<span style="font-size:14px;color:var(--text2);">${totalQty.toLocaleString()} 股</span>`;

    // Header row — always visible, shows aggregated info
    html += `<tr class="stock-header-row" onclick="toggleStock('${key}')">
      <td colspan="11">
        <div style="display:flex;align-items:center;gap:0;flex-wrap:wrap;row-gap:4px;">
          <span class="stock-toggle${isOpen?' open':''}" data-key="${key}">+</span>
          <span style="font-weight:700;font-size:16px;min-width:75px;">${ticker}</span>
          <span style="color:var(--text2);font-size:13px;margin-right:12px;">${g.name}</span>
          <span class="curr-badge curr-${curr}" style="margin-right:12px;">${curr}</span>
          ${qtySummary}
          <span style="margin:0 10px;color:var(--border2);">|</span>
          ${costSummary}
          <span style="margin:0 10px;color:var(--border2);">|</span>
          ${mvSummary}
          <span style="margin:0 10px;color:var(--border2);">|</span>
          ${pnlSummary}
          <span style="flex:1;min-width:8px;"></span>
          <span onclick="event.stopPropagation();" style="display:flex;gap:4px;flex-shrink:0;">
            <button class="btn-icon" onclick="openAddStock('${ticker}')">+ 新增筆</button>
          </span>
        </div>
      </td>
    </tr>`;

    // Detail rows — one per transaction record, collapsible
    const detailRows = g.rows.map(({s,i})=>{
      const cost    = s.cost * s.qty;
      const mv      = p > 0 ? p * s.qty : 0;
      const cTWD    = toTWD(cost, curr);
      const mTWD    = toTWD(mv, curr);
      const rowPnl  = mTWD - cTWD;
      const rowPct  = cTWD > 0 ? (rowPnl/cTWD)*100 : 0;
      const rowPc   = rowPnl>=0?'pos':'neg';
      const rowPnlO = mv - cost;
      const mvCell  = p>0 ? `${fmtTWD(mTWD)}${showOrig?`<br><span style="font-size:11px;color:var(--text2);">${fmtCurr(mv,curr,dec)}</span>`:''}` : '--';
      const pnlCell = p>0 ? `${rowPnl>=0?'+':'-'}${fmtTWD(Math.abs(rowPnl))}${showOrig?`<br><span style="font-size:11px;color:${rowPnlO>=0?'var(--pos)':'var(--neg)'};">${rowPnlO>=0?'+':''}${fmtCurr(rowPnlO,curr,dec)}</span>`:''}` : '--';
      return `<tr style="background:var(--bg2);">
        <td style="padding:8px 12px;font-size:14px;">${s.date}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;">${fmtCurr(s.cost,curr,dec)}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;">${s.qty.toLocaleString()}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;">${fmtCurr(cost,curr,dec)}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;">${p>0?fmtCurr(p,curr,dec):'<span style="color:var(--text3)">未設定</span>'}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;">${mvCell}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;" class="${rowPc}">${pnlCell}</td>
        <td style="padding:8px 12px;font-size:14px;text-align:right;" class="${rowPc}">${p>0?fmtPct(rowPct):'--'}</td>
        <td style="padding:8px 12px;text-align:right;">
          <span style="display:flex;gap:4px;justify-content:flex-end;">
            <button class="btn-icon" onclick="openEditStock(${i})">修改</button>
            <button class="btn-icon danger" onclick="openEditStock(${i},'dispose')">處分</button>
          </span>
        </td>
      </tr>`;
    }).join('');

    // Aggregate subtotal row for this ticker (show when expanded and >1 row)
    let subtotalRow = '';
    if(g.rows.length > 1){
      const pcSub = pnlTWD>=0?'pos':'neg';
      const mvCellSub = p>0 ? `${fmtTWD(totalMVTWD)}${showOrig?`<br><span style="font-size:11px;color:var(--text2);">${fmtCurr(totalMVOrig,curr,dec)}</span>`:''}` : '--';

              <th style="padding:6px 12px;font-size:12px;font-weight:500;color:var(--text2);text-align:right;">損益(TWD/原幣)</th>

}

function openAddStock(prefillTicker){
  document.getElementById('fs_date').value = new Date().toISOString().split('T')[0];
  ['fs_ticker','fs_name','fs_cost','fs_qty'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fs_curr').value = 'TWD';
  document.getElementById('fs_mkt').value = 'TW';
  // Pre-fill ticker/name/curr if adding another lot to existing stock
  if(prefillTicker){
    const existing = st.stocks[cu].find(s=>s.ticker===prefillTicker);
    if(existing){
      document.getElementById('fs_ticker').value = existing.ticker;
      document.getElementById('fs_name').value   = existing.name;
      document.getElementById('fs_curr').value   = existing.curr;
      document.getElementById('fs_mkt').value    = existing.mkt;
    }
  }
  const cfg = USERS_CFG[cu];
  document.getElementById('btnConfirmAdd').className = 'btn btn-primary btn-'+cfg.colorClass;
  openModal('modalAddStock');
}

function confirmAddStock(){
  const t = document.getElementById('fs_ticker').value.trim().toUpperCase();
  const n = document.getElementById('fs_name').value.trim();
  const d = document.getElementById('fs_date').value;
  const c = parseFloat(document.getElementById('fs_cost').value);
  const q = parseInt(document.getElementById('fs_qty').value);
  const curr = document.getElementById('fs_curr').value;
  const mkt = document.getElementById('fs_mkt').value;
  if(!t||!n||!d||isNaN(c)||isNaN(q)||c<=0||q<=0){ alert('請填寫所有欄位，數值需大於0'); return; }
  st.stocks[cu].push({ticker:t, name:n, date:d, cost:c, qty:q, curr, mkt});
  if(!st.prices[t]) st.prices[t] = 0;
  sortData();
  save();
  closeModal('modalAddStock');
  renderPortfolio();
  renderPricePage();
}

function openEditStock(idx, mode){
  editStockIndex = idx;
  const s = st.stocks[cu][idx];
  document.getElementById('editStockTitle').textContent = `${s.ticker} ${s.name}`;
  document.getElementById('es_ticker').value = s.ticker;
  document.getElementById('es_name').value = s.name;
  document.getElementById('es_curr').value = s.curr;
  document.getElementById('es_mkt').value = s.mkt;
  document.getElementById('es_date').value = s.date;
  document.getElementById('es_cost').value = s.cost;
  document.getElementById('es_qty').value = s.qty;

  // dispose info
  const dec = (s.curr==='USD'||s.curr==='HKD') ? 2 : 0;
  document.getElementById('dp_info_ticker').textContent = s.ticker + ' ' + s.name;
  document.getElementById('dp_info_cost').textContent = fmtCurr(s.cost, s.curr, dec);
  document.getElementById('dp_info_qty').textContent = s.qty.toLocaleString() + ' 股';
  document.getElementById('dp_date').value = new Date().toISOString().split('T')[0];
  document.getElementById('dp_qty').value = '';
  document.getElementById('dp_price').value = '';
  document.getElementById('dp_fee').value = '';
  document.getElementById('dp_preview_val').textContent = '--';
  document.getElementById('dp_preview_val').className = '';

  document.getElementById('btnConfirmEdit').className = 'btn btn-primary btn-'+cfg.colorClass;

  switchEditMode(mode||'edit');
  openModal('modalEditStock');
}

function switchEditMode(mode){
  editMode = mode;
  document.getElementById('segEdit').classList.toggle('active', mode==='edit');
  document.getElementById('segDispose').classList.toggle('active', mode==='dispose');
  document.getElementById('editArea').classList.toggle('hidden', mode!=='edit');
  document.getElementById('disposeArea').classList.toggle('hidden', mode!=='dispose');
}

function confirmEditStock(){
  const s = st.stocks[cu][editStockIndex];
  s.ticker = document.getElementById('es_ticker').value.trim().toUpperCase();
  s.name = document.getElementById('es_name').value.trim();
  s.curr = document.getElementById('es_curr').value;
  s.mkt = document.getElementById('es_mkt').value;
  s.date = document.getElementById('es_date').value;
  s.cost = parseFloat(document.getElementById('es_cost').value)||s.cost;
  s.qty = parseInt(document.getElementById('es_qty').value)||s.qty;
  sortData();
  save();
  closeModal('modalEditStock');
  renderPortfolio();
  renderPricePage();
}

function calcDisposePreview(){
  const s = st.stocks[cu][editStockIndex];
  const qty = parseInt(document.getElementById('dp_qty').value)||0;
  const price = parseFloat(document.getElementById('dp_price').value)||0;
  const fee = parseFloat(document.getElementById('dp_fee').value)||0;
  if(!qty||!price){ document.getElementById('dp_preview_val').textContent='--'; return; }
  const cost = s.cost * qty;
  const revenue = price * qty - fee;
  const pnl = toTWD(revenue - cost, s.curr);
  const el = document.getElementById('dp_preview_val');
  el.textContent = (pnl>=0?'+':'-') + fmtTWD(Math.abs(pnl));
  el.className = pnl>=0?'pos':'neg';
}

function confirmDispose(){
  const s = st.stocks[cu][editStockIndex];
  const qty = parseInt(document.getElementById('dp_qty').value)||0;
  const price = parseFloat(document.getElementById('dp_price').value)||0;
  const fee = parseFloat(document.getElementById('dp_fee').value)||0;
  const date = document.getElementById('dp_date').value;
  if(!qty||!price||!date){ alert('請填寫處分日期、股數與價格'); return; }
  if(qty > s.qty){ alert('處分股數超過持有股數'); return; }

  const cost = s.cost * qty;
  const revenue = price * qty - fee;
  const pnlOrigCurr = revenue - cost;
  const pnlTWD = toTWD(pnlOrigCurr, s.curr);
  const pct = cost>0 ? (pnlOrigCurr/cost)*100 : 0;

  // Record disposal
  st.disposals[cu].push({
    ticker: s.ticker, name: s.name, curr: s.curr,
    buyCost: s.cost, disposePrice: price, fee,
    qty, date,
    costTotal: cost, revenueTotal: revenue,
    pnlTWD, pct
  });

  // Update stock
  s.qty -= qty;
  if(s.qty <= 0){ st.stocks[cu].splice(editStockIndex, 1); }

  sortData();
  save();
  closeModal('modalEditStock');
  renderPortfolio();
}

function toggleDisposal(ticker){
  disposalOpen[ticker] = !disposalOpen[ticker];
  const toggle = document.querySelector(`.dgh-toggle[data-ticker="${ticker}"]`);
  const body = document.querySelector(`.disposal-body-wrap[data-ticker="${ticker}"]`);
  if(!toggle||!body) return;
  toggle.classList.toggle('open', disposalOpen[ticker]);
  body.classList.toggle('collapsed', !disposalOpen[ticker]);
}

function toggleAllDisposals(){
  const groups = document.querySelectorAll('.dgh-toggle');
  const allOpen = [...groups].every(g=>g.classList.contains('open'));
  groups.forEach(g=>{
    const ticker = g.dataset.ticker;
    disposalOpen[ticker] = !allOpen;
    g.classList.toggle('open', !allOpen);
    const body = document.querySelector(`.disposal-body-wrap[data-ticker="${ticker}"]`);
    if(body) body.classList.toggle('collapsed', allOpen);
  });
  const btn = document.querySelector('#page1 .collapse-all-btn');
  if(btn) btn.textContent = allOpen ? '⊞ 展開全部' : '⊟ 全部收合';
}

function renderDisposalTable(){
  const container = document.getElementById('disposalGroupsContainer');
  const list = st.disposals[cu];

  if(!list.length){
    container.innerHTML = '<div class="empty-state">尚無處分紀錄</div>';
    document.getElementById('disposalSummary').innerHTML = '';
    return;
  }

  // Group by ticker
  const groups = {};
  list.forEach(d=>{
    const key = d.ticker;
    if(!groups[key]) groups[key] = {ticker:d.ticker, name:d.name, curr:d.curr, records:[]};
    groups[key].records.push(d);
  });

  container.innerHTML = Object.values(groups).map(g=>{
    const curr = g.curr;
    const dec = (curr==='USD'||curr==='HKD')?2:0;
    const ticker = g.ticker;

    // subtotals for this ticker
    let subCostOrig=0, subRevOrig=0, subPnlTWD=0, subQty=0;
    g.records.forEach(r=>{ subCostOrig+=r.costTotal; subRevOrig+=r.revenueTotal; subPnlTWD+=r.pnlTWD; subQty+=r.qty; });
    const subPnlOrig = subRevOrig - subCostOrig;
    const subPct = subCostOrig>0?(subPnlOrig/subCostOrig)*100:0;
    const pc = subPnlTWD>=0?'pos':'neg';

    if(!(ticker in disposalOpen)) disposalOpen[ticker] = false; // default collapsed
    const isOpen = disposalOpen[ticker];

    const rows = g.records.map((d,ri)=>{
      const pc2 = d.pnlTWD>=0?'pos':'neg';
      // find global index in st.disposals[cu]
      const globalIdx = st.disposals[cu].indexOf(d);
      return `<tr>
        <td>${d.date}</td>
        <td class="right">${fmtCurr(d.buyCost,curr,dec)}</td>
        <td class="right">${fmtCurr(d.disposePrice,curr,dec)}</td>
        <td class="right">${d.qty.toLocaleString()}</td>
        <td class="right">${fmtCurr(d.costTotal,curr,dec)}</td>
        <td class="right">${fmtCurr(d.revenueTotal,curr,dec)}</td>
        <td class="right ${pc2}">${d.pnlTWD>=0?'+':'-'}${fmtTWD(Math.abs(d.pnlTWD))}</td>
        <td class="right ${pc2}">${(d.revenueTotal-d.costTotal)>=0?'+':''}${fmtCurr(d.revenueTotal-d.costTotal,curr,dec)}</td>
        <td class="right ${pc2}">${fmtPct(d.pct)}</td>
        <td><button class="btn-icon" onclick="openEditDisposal(${globalIdx})">修改</button></td>
      </tr>`;
    }).join('');

    return `<div class="disposal-group">
      <div class="disposal-group-header" style="cursor:pointer;" onclick="toggleDisposal('${ticker}')">
        <div class="dgh-left">
          <span class="dgh-toggle${isOpen?' open':''}" data-ticker="${ticker}" onclick="event.stopPropagation();toggleDisposal('${ticker}')">+</span>
          <span class="dgh-title">${g.ticker}</span>
          <span class="dgh-sub">${g.name}</span>
          <span class="curr-badge curr-${curr}">${curr}</span>
          <span style="font-size:14px;color:var(--text2);">${subQty.toLocaleString()} 股 &nbsp;·&nbsp; ${g.records.length} 筆</span>
        </div>
        <div style="text-align:right;">
          <div class="dgh-pnl ${pc}">${subPnlTWD>=0?'+':'-'}${fmtTWD(Math.abs(subPnlTWD))} TWD</div>
          <div style="font-size:13px;color:var(--text2);">原幣 ${subPnlOrig>=0?'+':''}${fmtCurr(subPnlOrig,curr,dec)} &nbsp;${fmtPct(subPct)}</div>
        </div>
      </div>
      <div class="disposal-body-wrap${isOpen?'':' collapsed'}" data-ticker="${ticker}">
        <div class="tbl-wrap" style="margin-bottom:0;border-radius:0 0 var(--rad) var(--rad);">
          <table>
            <thead><tr>
              <th>處分日期</th>
              <th class="right">買入均價</th><th class="right">處分均價</th>
              <th class="right">股數</th>
              <th class="right">成本(${curr})</th><th class="right">處分金額(${curr})</th>
              <th class="right">損益(TWD)</th><th class="right">損益(${curr})</th>
              <th class="right">損益%</th><th></th>
            </tr></thead>
            <tbody>
              ${rows}
              <tr class="subtotal-row">
                <td>小計</td>
                <td></td><td></td>
                <td class="right">${subQty.toLocaleString()}</td>
                <td class="right">${fmtCurr(subCostOrig,curr,dec)}</td>
                <td class="right">${fmtCurr(subRevOrig,curr,dec)}</td>
                <td class="right ${pc}">${subPnlTWD>=0?'+':'-'}${fmtTWD(Math.abs(subPnlTWD))}</td>
                <td class="right ${pc}">${subPnlOrig>=0?'+':''}${fmtCurr(subPnlOrig,curr,dec)}</td>
                <td class="right ${pc}">${fmtPct(subPct)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  // overall summary
  let totalPnl=0, wins=0, losses=0;
  list.forEach(d=>{ totalPnl+=d.pnlTWD; if(d.pnlTWD>=0)wins++; else losses++; });
  const pc = totalPnl>=0?'pos':'neg';
  document.getElementById('disposalSummary').innerHTML = `
    <div class="mc"><div class="mc-label">累計已實現損益 (TWD)</div><div class="mc-val ${pc}">${totalPnl>=0?'+':'-'}${fmtTWD(Math.abs(totalPnl))}</div></div>
    <div class="mc"><div class="mc-label">獲利次數</div><div class="mc-val pos">${wins} 次</div></div>
    <div class="mc"><div class="mc-label">虧損次數</div><div class="mc-val neg">${losses} 次</div></div>
    <div class="mc"><div class="mc-label">勝率</div><div class="mc-val">${list.length>0?((wins/list.length)*100).toFixed(0):0}%</div></div>`;
}

function destroyCharts(){
  ['allocChart','pnlChart','trendChart'].forEach(id=>{ if(charts[id]){charts[id].destroy();delete charts[id];} });
}

function renderDashboard(){
  destroyCharts();
  const stocks = st.stocks[cu];
  const uc = USERS_CFG[cu].color;
  const cashData = st.cash[cu];

  // alloc: stocks + cash per currency
  const allocLabels = [];
  const allocVals = [];
  stocks.forEach(s=>{
    const p = getPrice(s.ticker);
    if(p>0){
      allocLabels.push(s.ticker);
      allocVals.push(toTWD(p*s.qty, s.curr));
    }
  });
  let totalCashTWD = 0;
  CURR_LIST.forEach(c=>{ const v=toTWD(parseFloat(cashData[c])||0,c); if(v>0){totalCashTWD+=v;} });
  if(totalCashTWD>0){ allocLabels.push('現金'); allocVals.push(totalCashTWD); }
  const totalAll = allocVals.reduce((a,b)=>a+b,0);

  document.getElementById('allocLegend').innerHTML = allocLabels.map((l,i)=>`<span class="lg-item"><span class="lg-dot" style="background:${PALETTE[i]||'#aaa'}"></span>${l} ${totalAll>0?((allocVals[i]/totalAll)*100).toFixed(1):0}%</span>`).join('');

  charts.allocChart = new Chart(document.getElementById('allocChart'),{type:'bar',data:{labels:allocLabels,datasets:[{data:allocVals,backgroundColor:PALETTE,borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtTWD(ctx.raw)+'（'+(totalAll>0?((ctx.raw/totalAll)*100).toFixed(1):0)+'%）'}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#888'}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:10},color:'#888',callback:v=>'NT$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v)}}}}});

  // pnl
  const pnlStocks = stocks.filter(s=>getPrice(s.ticker)>0);
  const pnlVals = pnlStocks.map(s=>{ const p=getPrice(s.ticker); return ((p-s.cost)/s.cost)*100; });
  document.getElementById('pnlWrap').style.height = Math.max(210, pnlStocks.length*46+60)+'px';
  charts.pnlChart = new Chart(document.getElementById('pnlChart'),{type:'bar',data:{labels:pnlStocks.map(s=>s.ticker),datasets:[{data:pnlVals,backgroundColor:pnlVals.map(v=>v>=0?'#1D9E75':'#D85A30'),borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtPct(ctx.raw)}}},scales:{x:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},color:'#888',callback:v=>v.toFixed(0)+'%'}},y:{grid:{display:false},ticks:{font:{size:12}}}}}});

  // ── Trend chart from real snapshots
  if(!st.snapshots) st.snapshots = [[],[]];
  const snaps = st.snapshots[cu];
  const snapshotCount = document.getElementById('snapshotCount');
  const listToggle = document.getElementById('snapshotListToggle');

  if(snaps.length === 0){
    snapshotCount.textContent = '尚無記錄，更新市價後按「記錄今日資產」開始累積';
    listToggle.style.display = 'none';
    if(charts.trendChart){ charts.trendChart.destroy(); delete charts.trendChart; }
    document.getElementById('trendChart').getContext('2d').clearRect(0,0,999,999);
  } else {
    snapshotCount.textContent = `共 ${snaps.length} 筆記錄`;
    listToggle.style.display = '';
    const labels = snaps.map(s=>s.date);
    const vals   = snaps.map(s=>s.total);
    if(charts.trendChart) charts.trendChart.destroy();
    charts.trendChart = new Chart(document.getElementById('trendChart'),{
      type:'line',
      data:{labels,datasets:[{
        data:vals, borderColor:uc, backgroundColor:uc+'22',
        fill:true, tension:0.3,
        pointBackgroundColor:uc, pointRadius:5, pointHoverRadius:8
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{
          title:ctx=>ctx[0].label,
          label:ctx=>'總資產：'+fmtTWD(ctx.raw)
        },displayColors:false,backgroundColor:'rgba(20,20,20,0.9)',titleColor:'#aaa',bodyColor:'#fff',padding:10}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:12},color:'#888',maxRotation:45}},
          y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:11},color:'#888',
            callback:v=>'NT$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v)}}
        }
      }
    });
    renderSnapshotList();
  }
}

// ════════════════════════════════════════
// SNAPSHOTS
// ════════════════════════════════════════
function recordSnapshot(){
  if(!st.snapshots) st.snapshots = [[],[]];
  const d = calcUserSummary(cu);
  if(d.total === 0){ alert('目前總資產為零，請先更新市價再記錄。'); return; }

  const today = new Date().toISOString().slice(0,10);
  const snaps = st.snapshots[cu];

  // If same date already exists, update it instead of adding a new one
  const existing = snaps.findIndex(s=>s.date===today);
  const record = { date:today, total:Math.round(d.total), mv:Math.round(d.tMV_TWD), cash:Math.round(d.cashTWD) };

  if(existing>=0){
    if(!confirm(`今天（${today}）已有一筆記錄（${fmtTWD(snaps[existing].total)}），要更新為目前數值（${fmtTWD(record.total)}）嗎？`)) return;
    snaps[existing] = record;
  } else {
    snaps.push(record);
    snaps.sort((a,b)=>a.date<b.date?-1:1);
  }

  save();
  const btn = document.getElementById('snapshotBtn');
  btn.textContent = '✓ 已記錄';
  btn.style.background = 'var(--pos)';
  btn.style.color = '#fff';
  btn.style.border = 'none';
  setTimeout(()=>{ btn.textContent='📌 記錄今日資產'; btn.style.cssText=''; }, 1800);
  renderDashboard();
}

function renderSnapshotList(){
  const snaps = st.snapshots[cu];
  const el = document.getElementById('snapshotList');
  if(!el) return;
  el.innerHTML = snaps.length === 0 ? '<div style="color:var(--text2);font-size:14px;">尚無記錄</div>' :
    `<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">點擊日期旁的 × 刪除該筆記錄</div>` +
    [...snaps].reverse().map((s,ri)=>{
      const i = snaps.length - 1 - ri; // real index
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;">
        <span style="color:var(--text2);">${s.date}</span>
        <span style="font-weight:600;">${fmtTWD(s.total)}</span>
        <span style="font-size:12px;color:var(--text2);">持股 ${fmtTWD(s.mv)} ／ 現金 ${fmtTWD(s.cash)}</span>
        <button onclick="deleteSnapshot(${i})" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:0 4px;" title="刪除">×</button>
      </div>`;
    }).join('');
}

function deleteSnapshot(i){
  if(!confirm('確定刪除這筆快照紀錄？')) return;
  st.snapshots[cu].splice(i,1);
  save();
  renderDashboard();
}

function toggleSnapshotList(){
  const el = document.getElementById('snapshotList');
  const btn = document.getElementById('snapshotListToggle');
  const hidden = el.classList.toggle('hidden');
  btn.textContent = hidden ? '管理記錄' : '收合記錄';
  if(!hidden) renderSnapshotList();
}

// ════════════════════════════════════════
// THEME
// ════════════════════════════════════════
const ALL_THEMES = ['','theme-sage','theme-slate','theme-sand','theme-rose','theme-night','theme-charcoal'];

function applyTheme(theme){
  ALL_THEMES.forEach(t=>{ if(t) document.body.classList.remove(t); });
  if(theme) document.body.classList.add(theme);
  // Update swatch active state
  document.querySelectorAll('.theme-swatch').forEach(sw=>{
    sw.classList.toggle('active', sw.dataset.theme === theme);
  });
}

document.getElementById('themePicker').addEventListener('click', e=>{
  const sw = e.target.closest('.theme-swatch');
  if(!sw) return;
  const theme = sw.dataset.theme;
  if(!st.themes) st.themes = ['',''];
  st.themes[cu] = theme;
  save();
  applyTheme(theme);
});

// ════════════════════════════════════════
// IMPORT / EXPORT JSON
// ════════════════════════════════════════
function exportJSON(){
  const blob = new Blob([JSON.stringify(st, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `investment_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      // Basic validation
      if(!data.stocks || !data.names){ alert('JSON 格式不正確，請確認是本系統匯出的檔案'); return; }
      if(!confirm('匯入將覆蓋目前所有資料，確定繼續？')) return;
      st = data;
      if(!st.themes) st.themes = ['',''];
      // Sort all data after import
      const prevCu = cu;
      [0,1].forEach(ui=>{ cu=ui; sortData(); }); cu=prevCu;
      save();
      renderWelcome();
      alert('匯入成功！');
    }catch(err){
      alert('解析失敗：' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ════════════════════════════════════════
// EDIT DISPOSAL RECORD
// ════════════════════════════════════════
let editDisposalIndex = -1;

function openEditDisposal(globalIdx){
  editDisposalIndex = globalIdx;
  const d = st.disposals[cu][globalIdx];
  const curr = d.curr;
  const dec = (curr==='USD'||curr==='HKD')?2:0;

  document.getElementById('ed_info').textContent =
    `${d.ticker} ${d.name}　買入均價 ${fmtCurr(d.buyCost,curr,dec)}`;
  document.getElementById('ed_date').value = d.date;
  document.getElementById('ed_qty').value = d.qty;
  document.getElementById('ed_price').value = d.disposePrice;
  document.getElementById('ed_fee').value = d.fee || 0;
  document.getElementById('ed_preview').textContent = '--';
  document.getElementById('ed_preview').className = '';

  const cfg = USERS_CFG[cu];
  document.getElementById('btnConfirmEditDisposal').className = 'btn btn-primary btn-' + cfg.colorClass;

  calcEditDisposalPreview();
  openModal('modalEditDisposal');
}

function calcEditDisposalPreview(){
  const d = st.disposals[cu][editDisposalIndex];
  if(!d) return;
  const qty   = parseInt(document.getElementById('ed_qty').value)   || 0;
  const price = parseFloat(document.getElementById('ed_price').value) || 0;
  const fee   = parseFloat(document.getElementById('ed_fee').value)  || 0;
  if(!qty || !price){ document.getElementById('ed_preview').textContent='--'; return; }
  const cost    = d.buyCost * qty;
  const revenue = price * qty - fee;
  const pnlTWD  = toTWD(revenue - cost, d.curr);
  const el = document.getElementById('ed_preview');
  el.textContent = (pnlTWD>=0?'+':'-') + fmtTWD(Math.abs(pnlTWD));
  el.className = pnlTWD>=0?'pos':'neg';
}

function confirmEditDisposal(){
  const d = st.disposals[cu][editDisposalIndex];
  if(!d) return;
  const qty   = parseInt(document.getElementById('ed_qty').value)    || 0;
  const price = parseFloat(document.getElementById('ed_price').value) || 0;
  const fee   = parseFloat(document.getElementById('ed_fee').value)  || 0;
  const date  = document.getElementById('ed_date').value;
  if(!qty||!price||!date){ alert('請填寫所有欄位'); return; }

  const cost    = d.buyCost * qty;
  const revenue = price * qty - fee;
  const pnlOrig = revenue - cost;
  const pnlTWD  = toTWD(pnlOrig, d.curr);
  const pct     = cost > 0 ? (pnlOrig / cost) * 100 : 0;

  d.date         = date;
  d.qty          = qty;
  d.disposePrice = price;
  d.fee          = fee;
  d.costTotal    = cost;
  d.revenueTotal = revenue;
  d.pnlTWD       = pnlTWD;
  d.pct          = pct;

  sortData();
  save();
  closeModal('modalEditDisposal');
  renderDisposalTable();
}

function deleteDisposalRecord(){
  if(!confirm('確定刪除此筆處分紀錄？此操作無法復原。')) return;
  st.disposals[cu].splice(editDisposalIndex, 1);
  save();
  closeModal('modalEditDisposal');
  renderDisposalTable();
}

// MODAL HELPERS
// ════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

// Click overlay to close
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.add('hidden'); });
});

// INIT
// ════════════════════════════════════════
// Sort both users' data on startup
[0,1].forEach(ui=>{ cu=ui; sortData(); }); cu=0;
if(!st.snapshots) st.snapshots = [[],[]];
renderWelcome();
</script>
